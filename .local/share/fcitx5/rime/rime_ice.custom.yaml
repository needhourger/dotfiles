patch:
  # 采用追加（/+）的方式修改拼写运算，这样不会覆盖原始的纠错和简拼配置
  "speller/algebra/+":
    # --- 声母模糊音（根据需要取消对应的注释 #） ---
    # - derive/^([zcs])h/$1/         # zh ch sh -> z c s（卷舌转平舌）
    # - derive/^([zcs])([^h])/$1h$2/ # z c s -> zh ch sh（平舌转卷舌）
    # - derive/^l/n/                 # l -> n
    # - derive/^n/l/                 # n -> l
    # - derive/^f/h/                 # f -> h
    # - derive/^h/f/                 # h -> f

    # --- 韵母模糊音（根据需要取消对应的注释 #） ---
    # - derive/ang$/an/              # 前后鼻音不分
    # - derive/an$/ang/
    - derive/eng$/en/              # 前后鼻音不分
    - derive/en$/eng/
    - derive/ing$/in/              # 前后鼻音不分
    - derive/in$/ing/

